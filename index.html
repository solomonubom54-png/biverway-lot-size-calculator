<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Biverway | Lot Size Calculator</title>
<link rel="icon" type="image/png" href="logo.png" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  [data-theme="dark"] {
    --bg: #0a0b0f; --card-bg: #0d0f17; --card-border: #1a1c28;
    --input-bg: #13151c; --input-border: #1e2130; --text: #e8eaf2;
    --muted: #555978; --very-muted: #3a3e52; --footer-text: #2a2c3a;
    --result-bg: #0b0d14; --row-hover: #0f1118; --row-border: #13151c;
    --badge-none-bg: #1a1c28; --subtitle-color: #3a3e52; --brand-color: #fff;
    --shadow: 0 24px 80px rgba(0,0,0,0.6); --toggle-bg: #1a1c28; --toggle-border: #2a2c3a;
  }
  [data-theme="light"] {
    --bg: #f0f2f7; --card-bg: #ffffff; --card-border: #e0e4ef;
    --input-bg: #f7f8fc; --input-border: #d4d8e8; --text: #111827;
    --muted: #6b7280; --very-muted: #9ca3af; --footer-text: #c0c4d0;
    --result-bg: #f9fafb; --row-hover: #f3f4f8; --row-border: #e9ecf3;
    --badge-none-bg: #f0f2f7; --subtitle-color: #9ca3af; --brand-color: #111827;
    --shadow: 0 24px 80px rgba(0,0,0,0.1); --toggle-bg: #1e2130; --toggle-border: #d4d8e8;
  }

  html, body {
    min-height: 100vh; width: 100%; overflow-x: hidden;
    background: var(--bg); display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; padding: 32px 20px; transition: background 0.3s;
  }

  .wrapper { width: 100%; max-width: 520px; animation: fadeIn 0.5s ease; }

  @media (min-width: 900px) {
    body { padding: 48px 40px; }
    .wrapper { max-width: 640px; }
    .brand { font-size: 28px !important; }
    .symbol-btn { font-size: 13px !important; padding: 12px 8px !important; }
    input[type=number] { font-size: 17px !important; padding: 16px 20px !important; }
    .label { font-size: 11px !important; }
    .reset-btn { font-size: 14px !important; padding: 15px !important; }
    .result-key { font-size: 13px !important; }
    .lot-value { font-size: 28px !important; }
    .normal-value { font-size: 17px !important; }
    .badge { font-size: 14px !important; padding: 5px 18px !important; }
    .result-row { padding: 18px 24px !important; }
    .section-pad { padding: 24px 24px 0 !important; }
    .inputs { padding: 20px 24px 24px !important; gap: 18px !important; }
    .results-header { padding: 14px 24px !important; }
    .card-footer { font-size: 11px !important; padding: 14px 24px !important; }
  }
  @media (min-width: 600px) and (max-width: 899px) {
    .wrapper { max-width: 560px; }
    .brand { font-size: 24px !important; }
    input[type=number] { font-size: 16px !important; }
    .lot-value { font-size: 24px !important; }
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes popIn  { 0% { transform:scale(0.92); opacity:0; } 100% { transform:scale(1); opacity:1; } }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 28px; }
  .header-main { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
  .logo-icon { width: 30px; height: 30px; border-radius: 6px; object-fit: contain; }
  .brand { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--brand-color); letter-spacing: -0.01em; transition: color 0.3s; }
  .subtitle { color: var(--subtitle-color); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; transition: color 0.3s; }

  /* ── CARD ── */
  .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); transition: background 0.3s, border-color 0.3s; }

  /* ── CARD TOP BAR — toggle lives here ── */
  .card-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 0;
  }
  .card-topbar-label {
    font-size: 9px; color: var(--very-muted);
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .theme-toggle {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--toggle-bg); border: 1px solid var(--toggle-border);
    cursor: pointer; font-size: 14px; transition: all 0.25s;
    display: flex; align-items: center; justify-content: center;
  }
  .theme-toggle:hover {
    border-color: #f5a623; transform: scale(1.1) rotate(20deg);
    box-shadow: 0 0 10px rgba(245,166,35,0.3);
  }

  .section-pad { padding: 14px 20px 0; }
  .label { font-size: 10px; color: var(--very-muted); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px; transition: color 0.2s; }
  .label.focused { color: #f5a623; }

  .symbol-row { display: flex; gap: 6px; }
  .symbol-btn { flex:1; padding:10px 4px; border-radius:7px; border:1px solid var(--input-border); background:transparent; color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; transition:all 0.18s; letter-spacing:0.02em; }
  .symbol-btn:hover { border-color:rgba(245,166,35,0.3); color:#f5a623; }
  .symbol-btn.active { background:#f5a623; border-color:#f5a623; color:#000; font-weight:500; }

  .glow-line { height:1px; background:linear-gradient(90deg,transparent,rgba(245,166,35,0.35),transparent); margin:14px 20px 0; }

  .inputs { padding:14px 20px 20px; display:flex; flex-direction:column; gap:14px; }
  .input-group { display:flex; flex-direction:column; }

  input[type=number] { width:100%; background:var(--input-bg); border:1px solid var(--input-border); color:var(--text); padding:14px 16px; font-size:15px; font-family:'DM Mono',monospace; border-radius:8px; outline:none; transition:border-color 0.2s,box-shadow 0.2s,background 0.3s; -moz-appearance:textfield; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  input[type=number]:focus { border-color:#f5a623; box-shadow:0 0 0 3px rgba(245,166,35,0.12); }
  input[type=number]::placeholder { color:var(--very-muted); }

  .reset-btn { width:100%; padding:13px; border-radius:8px; border:1px solid var(--input-border); background:transparent; color:var(--muted); font-family:'DM Mono',monospace; font-size:13px; cursor:pointer; transition:all 0.2s; letter-spacing:0.06em; text-transform:uppercase; }
  .reset-btn:hover { border-color:#e05252; color:#e05252; }

  /* ── RESULTS ── */
  .results { border-top:1px solid var(--card-border); background:var(--result-bg); transition:background 0.3s; }
  .results-header { padding:12px 18px; display:flex; align-items:center; justify-content:space-between; }
  .results-label { font-size:10px; color:var(--very-muted); letter-spacing:0.14em; text-transform:uppercase; }
  .live-indicator { font-size:9px; color:var(--very-muted); letter-spacing:0.1em; display:flex; align-items:center; gap:5px; }
  .live-dot { width:5px; height:5px; border-radius:50%; background:var(--input-border); transition:all 0.3s; }
  .live-dot.active { background:#34d399; box-shadow:0 0 6px #34d399; }

  .result-row { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--row-border); transition:background 0.2s; }
  .result-row:last-child { border-bottom:none; }
  .result-row:hover { background:var(--row-hover); }
  .result-key { font-size:12px; color:var(--muted); letter-spacing:0.06em; }

  .icon-btn { width:28px; height:28px; background:var(--input-bg); border:1px solid var(--input-border); border-radius:6px; font-size:13px; color:var(--muted); cursor:pointer; transition:all 0.2s; display:none; align-items:center; justify-content:center; flex-shrink:0; }
  .icon-btn.visible { display:flex; animation:popIn 0.2s ease; }
  .icon-btn:hover { border-color:#f5a623; color:#f5a623; background:rgba(245,166,35,0.08); }
  .icon-btn.copied { border-color:#34d399; color:#34d399; background:rgba(52,211,153,0.08); }
  .result-right { display:flex; align-items:center; gap:10px; }

  .share-row { padding:14px 18px; border-top:1px solid var(--row-border); display:none; }
  .share-row.visible { display:block; animation:fadeIn 0.3s ease; }
  .share-btn { width:100%; padding:11px; border-radius:8px; border:1px solid var(--input-border); background:transparent; color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; transition:all 0.2s; letter-spacing:0.08em; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap:8px; }
  .share-btn:hover { border-color:#f5a623; color:#f5a623; background:rgba(245,166,35,0.06); }
  .share-btn.shared { border-color:#34d399; color:#34d399; background:rgba(52,211,153,0.06); }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:#34d399; color:#000; padding:10px 20px; border-radius:8px; font-size:12px; font-family:'DM Mono',monospace; letter-spacing:0.06em; opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .badge { padding:4px 14px; border-radius:4px; font-size:13px; font-weight:500; letter-spacing:0.08em; }
  .badge-buy  { background:rgba(52,211,153,0.12); color:#34d399; border:1px solid rgba(52,211,153,0.25); }
  .badge-sell { background:rgba(248,113,113,0.12); color:#f87171; border:1px solid rgba(248,113,113,0.25); }
  .badge-none { background:var(--badge-none-bg); color:var(--muted); border:1px solid var(--input-border); }

  .lot-value { font-size:22px; font-weight:500; color:var(--input-border); transition:color 0.3s; }
  .lot-value.active { color:#f5a623; }
  .normal-value { font-size:15px; color:var(--input-border); transition:color 0.3s; }
  .normal-value.active { color:var(--text); }

  .hidden-row { display:none; }
  .hidden-row.visible { display:flex; animation:fadeIn 0.3s ease; }

  /* ── FOOTER ── */
  .card-footer {
    padding:12px 18px; border-top:1px solid var(--row-border);
    text-align:center; font-size:10px; color:var(--footer-text);
    letter-spacing:0.1em;
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER — no toggle here anymore -->
  <div class="header">
    <div class="header-main">
      <img src="logo.png" alt="Biverway Logo" class="logo-icon" onerror="this.style.display='none'" />
      <span class="brand">BIVERWAY</span>
    </div>
    <div class="subtitle">Lot Size Calculator</div>
  </div>

  <div class="card">

    <!-- CARD TOP BAR — toggle inside card, top right -->
    <div class="card-topbar">
      <span class="card-topbar-label">Instrument</span>
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">☀️</button>
    </div>

    <div class="section-pad">
      <div class="symbol-row">
        <button class="symbol-btn active" onclick="selectSymbol('EURUSD',this)">EURUSD</button>
        <button class="symbol-btn" onclick="selectSymbol('GBPUSD',this)">GBPUSD</button>
        <button class="symbol-btn" onclick="selectSymbol('USDCHF',this)">USDCHF</button>
        <button class="symbol-btn" onclick="selectSymbol('XAUUSD',this)">XAUUSD</button>
      </div>
    </div>

    <div class="glow-line"></div>

    <div class="inputs">
      <div class="input-group">
        <div class="label" id="lbl-entry">Entry Price</div>
        <input type="number" id="entry" step="any" placeholder="0.00000" inputmode="decimal"
          onfocus="focusLabel('lbl-entry')" onblur="blurLabel('lbl-entry')" oninput="recalculate()" />
      </div>
      <div class="input-group">
        <div class="label" id="lbl-sl">Stop Loss</div>
        <input type="number" id="sl" step="any" placeholder="0.00000" inputmode="decimal"
          onfocus="focusLabel('lbl-sl')" onblur="blurLabel('lbl-sl')" oninput="recalculate()" />
      </div>
      <div class="input-group">
        <div class="label" id="lbl-risk">Risk Amount ($)</div>
        <input type="number" id="risk" step="any" placeholder="0.00" inputmode="decimal"
          onfocus="focusLabel('lbl-risk')" onblur="blurLabel('lbl-risk')" oninput="recalculate()" />
      </div>
      <button class="reset-btn" onclick="resetAll()">↺ Reset All</button>
    </div>

    <div class="results">
      <div class="results-header">
        <span class="results-label">Results</span>
        <div class="live-indicator">
          <div class="live-dot" id="live-dot"></div>
          <span id="live-text">WAITING</span>
        </div>
      </div>

      <div class="result-row">
        <span class="result-key">DIRECTION</span>
        <span class="badge badge-none" id="direction-badge">—</span>
      </div>

      <div class="result-row hidden-row" id="actual-risk-row">
        <span class="result-key">ACTUAL RISK</span>
        <span class="normal-value" id="actual-risk-val">$0.00</span>
      </div>

      <div class="result-row">
        <span class="result-key">LOT SIZE</span>
        <div class="result-right">
          <button class="icon-btn" id="copy-lot-btn" onclick="copyValue('lot-val','copy-lot-btn','Lot size')" title="Copy lot size">⧉</button>
          <span class="lot-value" id="lot-val">0.00</span>
        </div>
      </div>

      <div class="result-row">
        <span class="result-key">TAKE PROFIT (1:3)</span>
        <div class="result-right">
          <button class="icon-btn" id="copy-tp-btn" onclick="copyValue('tp-val','copy-tp-btn','Take profit')" title="Copy take profit">⧉</button>
          <span class="normal-value" id="tp-val">0.00000</span>
        </div>
      </div>

      <div class="share-row" id="share-row">
        <button class="share-btn" id="share-btn" onclick="shareSetup()">
          <span>⬆</span> SHARE TRADE SETUP
        </button>
      </div>
    </div>

    <!-- FOOTER with version number -->
    <div class="card-footer">
      DESIGNED ACCORDING TO BIVERWAY TRADING SYSTEM · V1.4+
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let currentSymbol = 'EURUSD';
  let tradeData = null;

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  }

  function copyValue(valId, btnId, label) {
    const text = document.getElementById(valId).textContent.trim();
    if (!text || text === '0.00' || text === '0.00000' || text === '0.000') return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(btnId);
      btn.textContent = '✓';
      btn.classList.add('copied');
      showToast(label + ' copied!');
      setTimeout(() => { btn.textContent = '⧉'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function shareSetup() {
    if (!tradeData) return;
    const orderType = tradeData.direction === 'BUY' ? 'Buy Limit' : 'Sell Limit';
    const text =
`📊 ${tradeData.symbol}
${orderType}
EP: ${tradeData.entry}
SL: ${tradeData.sl}`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('share-btn');
      btn.innerHTML = '<span>✓</span> COPIED TO CLIPBOARD';
      btn.classList.add('shared');
      showToast('Trade setup copied!');
      setTimeout(() => {
        btn.innerHTML = '<span>⬆</span> SHARE TRADE SETUP';
        btn.classList.remove('shared');
      }, 2500);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = '✓ ' + msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function selectSymbol(sym, btn) {
    currentSymbol = sym;
    document.querySelectorAll('.symbol-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    resetAll();
    const fmt = sym === 'XAUUSD' ? '0.000' : '0.00000';
    document.getElementById('entry').placeholder = fmt;
    document.getElementById('sl').placeholder = fmt;
  }

  function focusLabel(id) { document.getElementById(id).classList.add('focused'); }
  function blurLabel(id)  { document.getElementById(id).classList.remove('focused'); }

  function resetAll() {
    document.getElementById('entry').value = '';
    document.getElementById('sl').value = '';
    document.getElementById('risk').value = '';
    recalculate();
  }

  function recalculate() {
    const e = parseFloat(document.getElementById('entry').value);
    const s = parseFloat(document.getElementById('sl').value);
    const r = parseFloat(document.getElementById('risk').value);
    const decFmt = currentSymbol === 'XAUUSD' ? 3 : 5;
    const ready = !isNaN(e) && !isNaN(s) && !isNaN(r) && e > 0 && s > 0 && r > 0 && e !== s;

    const dirBadge   = document.getElementById('direction-badge');
    const lotVal     = document.getElementById('lot-val');
    const tpVal      = document.getElementById('tp-val');
    const actualRow  = document.getElementById('actual-risk-row');
    const actualVal  = document.getElementById('actual-risk-val');
    const liveDot    = document.getElementById('live-dot');
    const liveText   = document.getElementById('live-text');
    const copyLotBtn = document.getElementById('copy-lot-btn');
    const copyTpBtn  = document.getElementById('copy-tp-btn');
    const shareRow   = document.getElementById('share-row');

    if (!ready) {
      tradeData = null;
      dirBadge.className = 'badge badge-none';
      dirBadge.textContent = '—';
      lotVal.className = 'lot-value';
      lotVal.textContent = '0.00';
      tpVal.className = 'normal-value';
      tpVal.textContent = currentSymbol === 'XAUUSD' ? '0.000' : '0.00000';
      actualRow.classList.remove('visible');
      liveDot.classList.remove('active');
      liveText.textContent = 'WAITING';
      copyLotBtn.classList.remove('visible');
      copyTpBtn.classList.remove('visible');
      shareRow.classList.remove('visible');
      return;
    }

    const direction = e > s ? 'BUY' : 'SELL';
    let point, lotRaw, actualRiskVal, tpPrice;

    if (currentSymbol === 'XAUUSD') {
      point = Math.abs(e - s) * 100;
      lotRaw = r / point;
    } else if (currentSymbol === 'USDCHF') {
      point = Math.abs(Math.round(e * 100000) - Math.round(s * 100000));
      lotRaw = (r * e) / point;
    } else {
      point = Math.abs(Math.round(e * 100000) - Math.round(s * 100000));
      lotRaw = r / point;
    }

    const lot = Math.round(lotRaw * 100) / 100;
    actualRiskVal = currentSymbol === 'USDCHF' ? (lot * point) / e : lot * point;

    if (currentSymbol === 'XAUUSD') {
      tpPrice = direction === 'BUY' ? e + Math.abs(e - s) * 3 : e - Math.abs(e - s) * 3;
    } else {
      const tpDist = (point * 3) / 100000;
      tpPrice = direction === 'BUY' ? e + tpDist : e - tpDist;
    }

    tradeData = {
      symbol: currentSymbol,
      direction,
      entry: e.toFixed(decFmt),
      sl: s.toFixed(decFmt)
    };

    dirBadge.className = `badge badge-${direction.toLowerCase()}`;
    dirBadge.textContent = direction;
    lotVal.className = 'lot-value active';
    lotVal.textContent = lot.toFixed(2);
    tpVal.className = 'normal-value active';
    tpVal.textContent = tpPrice.toFixed(decFmt);
    actualVal.className = 'normal-value active';
    actualVal.textContent = '$' + actualRiskVal.toFixed(2);
    actualRow.classList.add('visible');
    liveDot.classList.add('active');
    liveText.textContent = 'LIVE';
    copyLotBtn.classList.add('visible');
    copyTpBtn.classList.add('visible');
    shareRow.classList.add('visible');
  }
</script>
</body>
</html>
